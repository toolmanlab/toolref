services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: toolref-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - toolref
    restart: unless-stopped

  # ── Frontend (React/Vite → Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: toolref-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - toolref
    restart: unless-stopped

  # ── Ingestion Worker ───────────────────────────────────────────────────────
  ingestion-worker:
    build:
      context: ./backend
      target: development
    container_name: toolref-ingestion-worker
    command: ["python", "-m", "app.ingestion.worker"]
    env_file: .env
    volumes:
      - ./backend:/app
      - model-cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - toolref
    restart: unless-stopped

  # ── MCP Server (SSE mode) ──────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./backend
      target: development
    container_name: toolref-mcp-server
    command:
      - python
      - -m
      - app.mcp.main
      - --transport
      - sse
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      TOOLREF_API_URL: http://backend:8000
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/sse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - toolref
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: toolref-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-toolref}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toolref_secret}
      POSTGRES_DB: ${POSTGRES_DB:-toolref}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toolref}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toolref
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: toolref-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toolref
    restart: unless-stopped

  # ── etcd (Milvus dependency) ───────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: toolref-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"  # 4 GB
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=default=http://127.0.0.1:2380
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - toolref
    restart: unless-stopped

  # ── MinIO (Milvus dependency) ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: toolref-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - toolref
    restart: unless-stopped

  # ── Milvus Standalone ──────────────────────────────────────────────────────
  milvus-standalone:
    image: milvusdb/milvus:v2.4.17
    container_name: toolref-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    command: ["milvus", "run", "standalone"]
    networks:
      - toolref
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  milvus-data:
  etcd-data:
  minio-data:
  model-cache:

networks:
  toolref:
    driver: bridge
